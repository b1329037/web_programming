<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HW#4: 景點觀光展覽資訊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pagination-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body class="p-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>景點觀光展覽資訊</h1>
            <div class="d-flex align-items-center">
                <label for="search" class="me-2">名稱搜尋：</label>
                <input type="text" id="searchInput" onchange="handleSearch()" class="form-control" style="width: 200px;">
            </div>
        </div>

        <table id="csie" class="table table-striped table-hover">
            <thead class="table-success">
                <tr>
                    <th>名稱</th>
                    <th>地點</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="pagination-container">
            <button onclick="prevPage()" class="btn btn-sm btn-outline-secondary">上一頁</button>
            <span id="pageInfo">1 / 1 頁</span>
            <button onclick="nextPage()" class="btn btn-sm btn-outline-secondary">下一頁</button>
        </div>
    </div>

    <script>
        var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
        var allData = [];      // 原始所有資料
        var filteredData = []; // 搜尋後的資料
        var currentPage = 1;   // 目前頁碼
        const pageSize = 10;   // 每頁十筆

        // Ajax 抓取資料
        var xhr = new XMLHttpRequest();
        xhr.open('GET', openUrl, true);
        xhr.send();
        xhr.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                allData = JSON.parse(this.responseText);
                filteredData = allData;
                updateDisplay();
            }
        };

        // 更新顯示 (搜尋 + 分頁)
        function updateDisplay() {
            var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            // 計算當頁資料索引
            var start = (currentPage - 1) * pageSize;
            var end = start + pageSize;
            var pageData = filteredData.slice(start, end);

            // 渲染表格
            var tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";
            pageData.forEach(function(data) {
                var row = `<tr><td>${data.title}</td><td>${data.showInfo[0].location}</td></tr>`;
                tableBody.innerHTML += row;
            });

            // 更新頁碼資訊
            document.getElementById("pageInfo").innerHTML = `${currentPage} / ${totalPages} 頁`;
        }

        // 搜尋功能
        function handleSearch() {
            var keyword = document.getElementById("searchInput").value.trim().toLowerCase();
            filteredData = allData.filter(function(data) {
                return data.title.toLowerCase().includes(keyword);
            });
            currentPage = 1; // 搜尋後回到第一頁
            updateDisplay();
        }

        // 分頁跳轉
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updateDisplay();
            }
        }

        function nextPage() {
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                updateDisplay();
            }
        }
    </script>
</body>
</html>
